name: Deploy Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ieka-server-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build API
        run: dotnet build IekaSmartClass.Api/IekaSmartClass.Api.csproj -c Release

  deploy:
    name: Deploy
    needs: validate
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /opt/ieka-smartclass
          git pull origin main

      - name: Deploy
        run: |
          cd /opt/ieka-smartclass
          docker compose pull db backup nginx
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Show logs on failure
        if: failure()
        run: |
          cd /opt/ieka-smartclass
          docker compose logs --no-color --tail=200 || true
