name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ieka-prod-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build API
        run: dotnet build IekaSmartClass.Api/IekaSmartClass.Api.csproj -c Release

  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Create release archive
        run: |
          set +e
          tar --exclude-vcs \
            --exclude='.gitignore' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='bin' \
            --exclude='obj' \
            -czf release.tgz .
          rc=$?
          if [ $rc -eq 2 ]; then exit 2; fi
          ls -lh release.tgz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Upload release archive
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -p "$DEPLOY_PASSWORD" scp release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/ieka-events-release.tgz"

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -p "$DEPLOY_PASSWORD" ssh "$DEPLOY_USER@$DEPLOY_HOST" /bin/bash <<'EOF'
          set -euo pipefail
          DEPLOY_PATH="/opt/ieka-smartclass"

          mkdir -p "$DEPLOY_PATH"

          if [ ! -f "$DEPLOY_PATH/.env" ]; then
            echo "ERROR: $DEPLOY_PATH/.env not found on server."
            echo "Create it manually first. See deploy/server-setup.md for instructions."
            exit 1
          fi

          cp "$DEPLOY_PATH/.env" /tmp/ieka-env-backup
          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
          tar -xzf /tmp/ieka-events-release.tgz -C "$DEPLOY_PATH"
          rm -f /tmp/ieka-events-release.tgz
          mv /tmp/ieka-env-backup "$DEPLOY_PATH/.env"

          source "$DEPLOY_PATH/.env"
          mkdir -p "${HOST_DB_PATH:-/storage/ieka/db}" "${HOST_STORAGE_PATH:-/storage/ieka/files}" "${HOST_BACKUP_PATH:-/storage/ieka/backups}"

          cd "$DEPLOY_PATH"
          docker compose pull db backup nginx
          docker compose up -d --build --remove-orphans
          docker compose ps
          EOF

      - name: Show logs on failure
        if: failure()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -p "$DEPLOY_PASSWORD" ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd /opt/ieka-smartclass && docker compose logs --no-color --tail=200 db api web nginx backup"
