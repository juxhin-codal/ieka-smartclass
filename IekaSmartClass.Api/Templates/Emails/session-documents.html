<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dokumentet e Sesionit</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f4f8;font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:#1f2937;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f1f4f8;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:640px;background-color:#ffffff;border:1px solid #d0d7e2;">
          <tr>
            <td style="padding:20px 28px;background-color:#0f2138;border-bottom:4px solid #24456d;">
              <div style="font-size:20px;font-weight:700;color:#ffffff;">{{APP_NAME}}</div>
              <div style="margin-top:4px;font-size:12px;color:#c6d2e3;">Dokumentet e Sesionit</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <h1 style="margin:0 0 14px;font-size:24px;color:#0f172a;">{{MODULE_NAME}}</h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.7;color:#334155;">
                I/E nderuar {{RECIPIENT_NAME}},
              </p>
              <p style="margin:0 0 12px;font-size:15px;line-height:1.7;color:#334155;">
                Dokumentet e mëposhtme janë të disponueshme për sesionin e datës <strong>{{SESSION_DATE}}</strong>:
              </p>
              <div style="margin:16px 0 24px;padding:16px;background-color:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;">
                {{RAW_DOCUMENTS_LIST}}
              </div>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:20px;">
                <tr>
                  <td style="background-color:#0f2138;border-radius:6px;">
                    <a href="{{PLATFORM_URL}}" style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:700;color:#ffffff;text-decoration:none;">
                      Hap Platformën
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px;border-top:1px solid #e2e8f0;text-align:center;">
              <p style="margin:0;font-size:12px;color:#94a3b8;">© {{APP_NAME}} — Të gjitha të drejtat të rezervuara.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
