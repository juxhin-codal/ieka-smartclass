<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U hapën regjistrimet</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f4f8;font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:#1f2937;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f1f4f8;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:640px;background-color:#ffffff;border:1px solid #d0d7e2;">
          <tr>
            <td style="padding:20px 28px;background-color:#0f2138;border-bottom:4px solid #24456d;">
              <div style="font-size:20px;font-weight:700;color:#ffffff;">{{APP_NAME}}</div>
              <div style="margin-top:4px;font-size:12px;color:#c6d2e3;">Njoftim për hapjen e regjistrimeve</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <h1 style="margin:0 0 14px;font-size:24px;color:#0f172a;">U hapën regjistrimet</h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.7;color:#334155;">
                I/E nderuar {{RECIPIENT_NAME}}, regjistrimet për modulin më poshtë janë tashmë të hapura.
              </p>
              <div style="border:1px solid #dbe3f5;background-color:#f8fafc;padding:16px;">
                <p style="margin:0 0 8px;font-size:18px;font-weight:700;color:#0f172a;">{{MODULE_NAME}}</p>
                <p style="margin:0 0 4px;font-size:13px;color:#475569;">Datat: {{DATE_SUMMARY}}</p>
                <p style="margin:0 0 4px;font-size:13px;color:#475569;">Vendndodhja: {{LOCATION}}</p>
                <p style="margin:0;font-size:13px;color:#475569;">Orë CPD: {{CPD_HOURS}}</p>
              </div>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:20px;">
                <tr>
                  <td style="background-color:#0f2138;">
                    <a href="{{ACTION_LINK}}" style="display:inline-block;padding:12px 18px;font-size:14px;font-weight:700;color:#ffffff;text-decoration:none;">
                      Shiko modulin
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:16px 0 0;font-size:12px;line-height:1.6;color:#475569;">Linku: {{ACTION_LINK}}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
