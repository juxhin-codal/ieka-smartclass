services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ieka-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - "${HOST_DB_PATH:-/storage/ieka/db}:/var/opt/mssql"
    restart: unless-stopped

  api:
    container_name: ieka-api
    build:
      context: .
      dockerfile: IekaSmartClass.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=${DB_NAME:-IekaSmartClassDb};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER:-IekaSmartClass.Api}"
      JwtSettings__Audience: "${JWT_AUDIENCE:-IekaSmartClass.Web}"
      Storage__UseBlobStorage: "${STORAGE_USE_BLOB_STORAGE:-false}"
      Storage__RootPath: /app/storage
      Storage__PublicBaseUrl: "${PUBLIC_FILES_BASE_URL:-/api/LearningStorage/download}"
      App__EnableHttpsRedirection: "false"
      Email__FrontendBaseUrl: "${PUBLIC_FRONTEND_URL:-http://localhost:8080}"
      Email__Smtp__Host: "${SMTP_HOST:-smtp.gmail.com}"
      Email__Smtp__Port: "${SMTP_PORT:-587}"
      Email__Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      Email__Smtp__Username: "${SMTP_USERNAME:-}"
      Email__Smtp__Password: "${SMTP_PASSWORD:-}"
      Email__Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-}"
      Email__Smtp__FromName: "${SMTP_FROM_NAME:-IEKA SmartClass}"
      TwoFactor__Enabled: "${TWO_FACTOR_ENABLED:-true}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "${HOST_STORAGE_PATH:-/storage/ieka/files}:/app/storage"
    restart: unless-stopped

  web:
    container_name: ieka-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-/api}"
        API_INTERNAL_URL: "${API_INTERNAL_URL:-http://api:8080}"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-/api}"
      API_INTERNAL_URL: "${API_INTERNAL_URL:-http://api:8080}"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: ieka-nginx
    depends_on:
      - web
      - api
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  backup:
    image: mcr.microsoft.com/mssql-tools
    container_name: ieka-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      DB_NAME: "${DB_NAME:-IekaSmartClassDb}"
      BACKUP_INTERVAL_SECONDS: "${BACKUP_INTERVAL_SECONDS:-86400}"
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-14}"
    volumes:
      - "${HOST_BACKUP_PATH:-/storage/ieka/backups}:/backups"
      - "${HOST_STORAGE_PATH:-/storage/ieka/files}:/storage:ro"
      - ./deploy/backup/backup-loop.sh:/backup-loop.sh:ro
    entrypoint: ["/bin/bash", "/backup-loop.sh"]
    restart: unless-stopped
